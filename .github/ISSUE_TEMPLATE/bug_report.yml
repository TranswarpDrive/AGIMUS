name: Bug report
description: Report a reproducible bug in AGIMUS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: ios
    attributes:
      label: iOS version
      placeholder: iOS 18.0
  - type: input
    id: device
    attributes:
      label: Device or simulator
      placeholder: iPhone 16 Pro simulator
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste logs or attach screenshots if helpful.
